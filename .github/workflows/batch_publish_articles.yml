name: Batch Publish Articles to Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（不实际发布）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      start_date:
        description: '开始日期 (YYYY-MM-DD)'
        required: false
        default: '2026-03-07'
      end_date:
        description: '结束日期 (YYYY-MM-DD)'
        required: false
        default: '2026-03-28'

concurrency:
  group: batch-publish-articles
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  publish-articles:
    runs-on: ubuntu-latest
    
    env:
      GITHUB_TOKEN: ${{ secrets.TOKEN_PUBLISH }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      START_DATE: ${{ github.event.inputs.start_date }}
      END_DATE: ${{ github.event.inputs.end_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_PUBLISH }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Batch publish articles
        working-directory: scripts/daily_write
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] 模拟发布模式"
            echo "将发布从 ${START_DATE} 到 ${END_DATE} 的文章"
          else
            echo "开始批量发布文章到GitHub Issues..."
            echo "日期范围: ${START_DATE} 到 ${END_DATE}"
            python regenerate_and_publish.py
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 批量发布完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 日期范围: ${{ github.event.inputs.start_date }} 到 ${{ github.event.inputs.end_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- 模式: ${{ github.event.inputs.dry_run == 'true' && '模拟运行' || '实际发布' }}" >> $GITHUB_STEP_SUMMARY
