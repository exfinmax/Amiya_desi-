name: Publish Local Articles to Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（不实际发布）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: publish-local-articles
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  publish-articles:
    runs-on: ubuntu-latest
    
    env:
      GITHUB_TOKEN: ${{ secrets.TOKEN_PUBLISH }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_PUBLISH }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Publish articles to Issues
        working-directory: scripts/daily_write
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] 模拟发布模式"
            python publish_local_to_issues.py --dry-run
          else
            echo "开始批量发布文章到Issues..."
            python publish_local_to_issues.py
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-log
          path: scripts/daily_write/publish_log.txt
          if-no-files-found: warn
