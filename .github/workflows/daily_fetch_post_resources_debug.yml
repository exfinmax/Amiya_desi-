name: Daily Fetch & Post Resources (debug)

on:
  schedule:
    # Runs daily at 08:00 Asia/Shanghai (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: {}

concurrency:
  group: daily-post-resource
  cancel-in-progress: true

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    env:
      # Use repository secret TOKEN_PUBLISH (set this in repo Settings → Secrets)
      GITHUB_TOKEN: ${{ secrets.TOKEN_PUBLISH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Ensure scripts are executable
        run: |
          chmod +x ./scripts/daily_write/helper_fetch.py || true
          chmod +x ./scripts/daily_write/post_resource_article.sh || true

      - name: Run helper fetch (build resources.json)
        working-directory: ./scripts/daily_write
        run: |
          # helper_fetch.py writes resources.json in the same dir
          python helper_fetch.py

      - name: Show generated resources.json
        working-directory: ./scripts/daily_write
        run: |
          echo "== workspace =="
          ls -la
          echo "== resources.json preview =="
          if [ -f resources.json ]; then
            echo "resources.json exists; size:"
            stat -c "%s %y" resources.json || true
            head -c 2000 resources.json || true
          else
            echo "resources.json NOT FOUND"
            exit 0
          fi

      - name: Run poster (dry-run for debug)
        working-directory: ./scripts/daily_write
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_PUBLISH }}
          IMMEDIATE: "1"
          FORCE_PUBLISH: "1"
          DRY_RUN: "1"
        run: |
          ./post_resource_article.sh

      - name: Upload dry-run preview & resources
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-preview
          path: |
            ./scripts/daily_write/dry_run_payload.json
            ./scripts/daily_write/dry_run_preview.html
            ./scripts/daily_write/resources.json
            ./scripts/daily_write/article_post_log.txt
